name: Android – Publish to Google Play

on:
  push:
    branches-ignore: []   # trigger build on every branch
    tags: [ "v*" ]
  workflow_dispatch:
    inputs:
      track:
        description: "Play Store track (internal | alpha | beta | production)"
        required: true
        default: internal

permissions:
  contents: read

env:
  TRACK: ${{ github.event.inputs.track || 'internal' }}

jobs:
  build-and-publish:
    name: Build & Publish Android APK/AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Decode signing keystore ──────────────────────────────────────────
      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore

      # ── Build release AAB ────────────────────────────────────────────────
      # Replace this step with your actual Android build command once the
      # Android app source is added to the repository (e.g. using Gradle).
      - name: Build release AAB
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          echo "TODO: replace with actual Gradle build command, e.g.:"
          echo "  cd android && ./gradlew bundleRelease \\"
          echo "    -Pandroid.injected.signing.store.file=../release.keystore \\"
          echo "    -Pandroid.injected.signing.store.password=\$ANDROID_STORE_PASSWORD \\"
          echo "    -Pandroid.injected.signing.key.alias=\$ANDROID_KEY_ALIAS \\"
          echo "    -Pandroid.injected.signing.key.password=\$ANDROID_KEY_PASSWORD"

      # ── Prepare Google Play service account ─────────────────────────────
      - name: Write Play Store service account JSON
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo '${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}' > service-account.json

      # ── Upload to Google Play ────────────────────────────────────────────
      # Replace the `aabFile` path below with the actual path produced by the
      # build step above (e.g. android/app/build/outputs/bundle/release/app-release.aab).
      - name: Upload AAB to Google Play (${{ env.TRACK }})
        if: startsWith(github.ref, 'refs/tags/v')
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: service-account.json
          packageName: com.ltedu.app
          releaseFiles: "android/app/build/outputs/bundle/release/app-release.aab"
          track: ${{ env.TRACK }}
          whatsNewDirectory: app-store/android/metadata

      # ── Cleanup secrets from disk ────────────────────────────────────────
      - name: Remove secrets from disk
        if: always()
        run: rm -f release.keystore service-account.json
