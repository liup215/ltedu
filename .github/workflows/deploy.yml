name: Build and Deploy

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

env:
  DOCKER_USERNAME: ltedu # Hardcoded for offline deployment (no docker hub required)
  IMAGE_NAME_API: ltedu-api
  IMAGE_NAME_WEB: ltedu-web

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 1. Build Images (No Push)
    - name: Build API Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Dockerfile
        load: true # Load into local docker daemon
        tags: ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME_API }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build Web Image
      uses: docker/build-push-action@v5
      with:
        context: ./web
        file: ./web/Dockerfile
        load: true # Load into local docker daemon
        tags: ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME_WEB }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    # 2. Save Images to File
    - name: Save Docker Images
      run: |
        docker save ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME_API }}:latest | gzip > ltedu-api.tar.gz
        docker save ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME_WEB }}:latest | gzip > ltedu-web.tar.gz

    # 3. Upload artifacts for deploy job
    - name: Upload Docker image artifacts
      uses: actions/upload-artifact@v4
      with:
        name: docker-images
        path: |
          ltedu-api.tar.gz
          ltedu-web.tar.gz
        retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      actions: read
    steps:
    - name: Download Docker image artifacts
      uses: actions/download-artifact@v4
      with:
        name: docker-images

    # 4. Transfer Files
    - name: Copy files to Server via SCP
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "ltedu-api.tar.gz,ltedu-web.tar.gz"
        target: "~/ltedu-deploy/"

    # 5. Load and Deploy
    - name: Deploy on Server
      uses: appleboy/ssh-action@master
      env:
        DOCKER_USERNAME: ${{ env.DOCKER_USERNAME }}
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        envs: DOCKER_USERNAME
        script: |
          export DOCKER_USERNAME=$DOCKER_USERNAME
          cd ~/ltedu-deploy
          ls
          
          # Load images
          echo "Loading API image..."
          docker load < ltedu-api.tar.gz
          echo "Loading Web image..."
          docker load < ltedu-web.tar.gz
          
          # Pre-clean stacks to avoid race condition: docker stack rm is async,
          # so we must wait for all services to be fully removed before redeploying.
          for stack in ltedu bioedu; do
            if docker stack ls --format '{{.Name}}' | grep -q "^${stack}$"; then
              echo "Removing stack: $stack"
              docker stack rm "$stack"
              echo "Waiting for $stack services to be fully removed..."
              timeout=60
              elapsed=0
              while docker service ls --filter "label=com.docker.stack.namespace=${stack}" --format '{{.Name}}' | grep -q .; do
                if [ "$elapsed" -ge "$timeout" ]; then
                  echo "Timeout waiting for $stack services to be removed, continuing anyway"
                  break
                fi
                sleep 2
                elapsed=$((elapsed + 2))
              done
              echo "Stack $stack fully removed"
            fi
            # Remove any orphan services with the stack prefix (not tracked in any stack)
            while read -r svc; do
              echo "Removing orphan service: $svc"
              docker service rm "$svc" || true
              sleep 2
            done < <(docker service ls --format '{{.Name}}' | grep "^${stack}_" || true)
          done
          
          # Deploy
          cd /home/www/app/ltedu
          ./start.sh
          
