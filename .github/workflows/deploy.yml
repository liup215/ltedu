name: Build and Deploy

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  IMAGE_NAME_API: ltedu-api
  IMAGE_NAME_WEB: ltedu-web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push API
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Dockerfile
        push: true
        tags: ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME_API }}:latest,${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME_API }}:${{ github.sha }}

    - name: Build and push Web
      uses: docker/build-push-action@v5
      with:
        context: ./web
        file: ./web/Dockerfile
        push: true
        tags: ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME_WEB }}:latest,${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME_WEB }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Copy deployment files via SCP
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "deploy/docker-compose.prod.yml"
        target: "~/ltedu-deploy/"
        strip_components: 1

    - name: Execute deployment via SSH
      uses: appleboy/ssh-action@master
      env:
        DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        envs: DOCKER_USERNAME
        script: |
          cd ~/ltedu-deploy
          # Create data directory if not exists
          mkdir -p data
          
          # Pull new images
          docker compose -f docker-compose.prod.yml pull
          
          # Restart services
          docker compose -f docker-compose.prod.yml up -d --remove-orphans
          
          # Cleanup old images
          docker image prune -f
