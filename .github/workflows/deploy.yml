name: Build and Deploy

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

env:
  DOCKER_USERNAME: ltedu # Hardcoded for offline deployment (no docker hub required)
  IMAGE_NAME_API: ltedu-api
  IMAGE_NAME_WEB: ltedu-web

jobs:
  build:
    runs-on: [self-hosted, linux, x64]
    permissions:
      contents: read
      actions: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configure Docker socket permissions
      run: |
        # 使用 sudo 运行 docker 命令
        sudo docker ps || true
      continue-on-error: true

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        driver-opts: image=moby/buildkit:latest

    # 1. Build Images (No Push)
    - name: Build API Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Dockerfile
        load: true # Load into local docker daemon
        tags: ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME_API }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build Web Image
      uses: docker/build-push-action@v5
      with:
        context: ./web
        file: ./web/Dockerfile
        load: true # Load into local docker daemon
        tags: ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME_WEB }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    runs-on: [self-hosted, linux, x64]
    needs: build
    permissions:
      contents: read
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Deploy to local Docker
      env:
        DOCKER_USERNAME: ${{ env.DOCKER_USERNAME }}
      run: |
        cd /home/www/app/ltedu
        ./start.sh
          
