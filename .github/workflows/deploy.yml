name: Build and Deploy

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

env:
  DOCKER_USERNAME: ltedu # Hardcoded for offline deployment (no docker hub required)
  IMAGE_NAME_API: ltedu-api
  IMAGE_NAME_WEB: ltedu-web

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 1. Build Images (No Push)
    - name: Build API Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Dockerfile
        load: true # Load into local docker daemon
        tags: ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME_API }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build Web Image
      uses: docker/build-push-action@v5
      with:
        context: ./web
        file: ./web/Dockerfile
        load: true # Load into local docker daemon
        tags: ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME_WEB }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    # 2. Save Images to File
    - name: Save Docker Images
      run: |
        docker save ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME_API }}:latest | gzip > ltedu-api.tar.gz
        docker save ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME_WEB }}:latest | gzip > ltedu-web.tar.gz

    # 3. Transfer Files
    - name: Copy files to Server via SCP
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "deploy/docker-compose.prod.yml,ltedu-api.tar.gz,ltedu-web.tar.gz"
        target: "~/ltedu-deploy/"
        strip_components: 1

    # 4. Load and Deploy
    - name: Deploy on Server
      uses: appleboy/ssh-action@master
      env:
        DOCKER_USERNAME: ${{ env.DOCKER_USERNAME }}
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        envs: DOCKER_USERNAME
        script: |
          export DOCKER_USERNAME=$DOCKER_USERNAME
          cd ~/ltedu-deploy
          
          # Load images
          echo "Loading API image..."
          docker load < ltedu-api.tar.gz
          echo "Loading Web image..."
          docker load < ltedu-web.tar.gz
          
          # Create data directory
          mkdir -p data
          
          # Restart services (using loaded images)
          # We check for new images locally, no pull needed
          docker compose -f docker-compose.prod.yml up -d --force-recreate
          
          # Clean up artifacts
          rm ltedu-api.tar.gz ltedu-web.tar.gz
          docker image prune -f
