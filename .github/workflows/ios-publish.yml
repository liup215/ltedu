name: iOS – Publish to Apple App Store

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:
    inputs:
      submit_for_review:
        description: "Submit for App Store review after upload (true | false)"
        required: true
        default: "false"

permissions:
  contents: read

jobs:
  build-and-publish:
    name: Build & Publish iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Install Apple distribution certificate ───────────────────────────
      - name: Install distribution certificate
        run: |
          echo "${{ secrets.IOS_CERTIFICATE_BASE64 }}" | base64 --decode > dist-cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import dist-cert.p12 -k build.keychain \
            -P "${{ secrets.IOS_CERTIFICATE_PASSWORD }}" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "" build.keychain
          rm dist-cert.p12

      # ── Install provisioning profile ─────────────────────────────────────
      - name: Install provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" \
            | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/ltedu.mobileprovision

      # ── Build release IPA ────────────────────────────────────────────────
      # Replace this step with your actual Xcode build command once the iOS
      # app source is added to the repository.
      - name: Build release IPA
        run: |
          echo "TODO: replace with actual xcodebuild command, e.g.:"
          echo "  xcodebuild -workspace ios/LTEdu.xcworkspace \\"
          echo "    -scheme LTEdu \\"
          echo "    -configuration Release \\"
          echo "    -archivePath build/LTEdu.xcarchive \\"
          echo "    archive"
          echo "  xcodebuild -exportArchive \\"
          echo "    -archivePath build/LTEdu.xcarchive \\"
          echo "    -exportPath build/ipa \\"
          echo "    -exportOptionsPlist ios/ExportOptions.plist"

      # ── Write App Store Connect API key ──────────────────────────────────
      - name: Write App Store Connect API key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}" \
            | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8

      # ── Upload IPA to App Store Connect ─────────────────────────────────
      # Replace the IPA path below with the path produced by the build step.
      - name: Upload IPA to App Store Connect
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "build/ipa/LTEdu.ipa" \
            --apiKey "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}"

      # ── Submit for review (optional) ─────────────────────────────────────
      - name: Submit for App Store review
        if: github.event.inputs.submit_for_review == 'true'
        run: |
          echo "Submitting for App Store review via App Store Connect API..."
          echo "TODO: implement automated review submission using the App Store Connect REST API."

      # ── Cleanup ──────────────────────────────────────────────────────────
      - name: Remove API key from disk
        if: always()
        run: |
          rm -f ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8
