info:
  contact:
    name: LTEdu Support
  description: LTEdu 在线教育平台后端接口文档
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: LTEdu API
  version: "1.0"
paths:
  /v1/account/update:
    post:
      consumes:
      - application/json
      description: 更新当前已登录用户的个人信息（不包含状态等管理员字段）
      parameters:
      - description: 账户更新信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.AccountUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 更新当前用户账户信息
      tags:
      - 用户管理
  /v1/addons:
    get:
      consumes:
      - application/json
      description: 返回已安装的插件列表
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 获取插件列表
      tags:
      - 系统设置
  /v1/admin/teacher-applications/approve:
    post:
      consumes:
      - application/json
      description: 通过指定的教师资格申请（仅管理员）
      parameters:
      - description: 申请ID和备注
        in: body
        name: body
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 审批通过教师申请
      tags:
      - 教师申请
  /v1/admin/teacher-applications/detail:
    post:
      consumes:
      - application/json
      description: 获取指定教师申请的详细信息（仅管理员）
      parameters:
      - description: 申请ID
        in: body
        name: body
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 获取教师申请详情
      tags:
      - 教师申请
  /v1/admin/teacher-applications/list:
    post:
      consumes:
      - application/json
      description: 获取所有教师申请列表（仅管理员）
      parameters:
      - description: 查询条件
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.TeacherApplicationQuery'
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 获取教师申请列表
      tags:
      - 教师申请
  /v1/admin/teacher-applications/reject:
    post:
      consumes:
      - application/json
      description: 拒绝指定的教师资格申请（仅管理员）
      parameters:
      - description: 申请ID和拒绝理由
        in: body
        name: body
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 拒绝教师申请
      tags:
      - 教师申请
  /v1/ai/conversation/close:
    post:
      consumes:
      - application/json
      description: Deactivates the specified conversation session for the current
        user.
      parameters:
      - description: Session key
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.ConversationHistoryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Session closed
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Close a conversation session
      tags:
      - AI Conversation
  /v1/ai/conversation/history:
    post:
      consumes:
      - application/json
      description: Returns the full message history for the specified conversation
        session.
      parameters:
      - description: Session key
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.ConversationHistoryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: History retrieved
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get conversation history
      tags:
      - AI Conversation
  /v1/ai/conversation/message:
    post:
      consumes:
      - application/json
      description: Sends a user message to the AI and returns the assistant's reply.
        Maintains full conversation context.
      parameters:
      - description: Message payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.SendMessageRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Message sent
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Send a message in a conversation
      tags:
      - AI Conversation
  /v1/ai/conversation/reset:
    post:
      consumes:
      - application/json
      description: Clears the message history for the specified session. Supports
        explicit context reset ("start over"). Optionally accepts new context data.
      parameters:
      - description: Session key and optional new context
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.ResetContextRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Context reset
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Reset conversation context
      tags:
      - AI Conversation
  /v1/ai/conversation/sessions:
    post:
      description: Returns a list of all active AI conversation sessions for the authenticated
        user.
      produces:
      - application/json
      responses:
        "200":
          description: Sessions listed
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List conversation sessions
      tags:
      - AI Conversation
  /v1/ai/conversation/start:
    post:
      consumes:
      - application/json
      description: Creates a new conversation session with optional user context (role,
        preferences, recent actions).
      parameters:
      - description: Optional initial context
        in: body
        name: body
        schema:
          $ref: '#/definitions/model.StartSessionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Session created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Start a new AI conversation session
      tags:
      - AI Conversation
  /v1/ai/nlu/analyze:
    post:
      consumes:
      - application/json
      description: Performs NLU analysis on an educational query, returning detected
        intent, entities, and language
      parameters:
      - description: Query to analyze
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.NLURequest'
      produces:
      - application/json
      responses:
        "200":
          description: NLU result
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
      summary: Analyze educational query intent and entities
      tags:
      - NLU
  /v1/ai/nlu/feedback:
